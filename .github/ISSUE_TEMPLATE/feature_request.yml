name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: chart
    attributes:
      label: Chart
      description: Which chart does this apply to?
      options:
        - generic
        - new chart
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to add or change?
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: Why is this needed? What problem does it solve?
