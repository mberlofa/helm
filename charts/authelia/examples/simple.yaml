# Minimal Authelia deployment with SQLite and file-based users
# Access via: kubectl port-forward svc/<release>-authelia 9091:80

secrets:
  jwtSecret: "replace-with-64-char-random-string"
  sessionSecret: "replace-with-64-char-random-string"
  storageEncryptionKey: "replace-with-at-least-20-char-string"

config:
  session:
    cookies:
      - domain: example.com
        authelia_url: "https://auth.example.com"

  access_control:
    default_policy: one_factor

usersDatabase:
  users:
    admin:
      displayname: "Admin User"
      email: "admin@example.com"
      # Password: "password" (argon2id hash — generate with: docker run --rm authelia/authelia:4.39.16 authelia crypto hash generate argon2)
      password: "$argon2id$v=19$m=65536,t=3,p=4$REPLACE_WITH_REAL_HASH"
      groups:
        - admins
