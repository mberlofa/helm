{{/* Configuration secret — always rendered */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "authelia.fullname" . }}-config
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
stringData:
  configuration.yml: |
    {{- include "authelia.configuration" . | nindent 4 }}
{{- if not .Values.secrets.existingSecret }}
---
{{/* Credentials secret — rendered when no existingSecret */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "authelia.fullname" . }}-secrets
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
stringData:
  jwt-secret: {{ .Values.secrets.jwtSecret | quote }}
  session-secret: {{ .Values.secrets.sessionSecret | quote }}
  storage-encryption-key: {{ .Values.secrets.storageEncryptionKey | quote }}
  {{- if .Values.secrets.oidcHmacSecret }}
  oidc-hmac-secret: {{ .Values.secrets.oidcHmacSecret | quote }}
  {{- end }}
  {{- $dbType := include "authelia.dbType" . }}
  {{- if and (ne $dbType "sqlite") (not .Values.database.external.existingSecret) }}
  {{- if .Values.postgresql.enabled }}
  db-password: {{ .Values.postgresql.auth.password | quote }}
  {{- else if .Values.mysql.enabled }}
  db-password: {{ .Values.mysql.auth.password | quote }}
  {{- else }}
  db-password: {{ .Values.database.external.password | quote }}
  {{- end }}
  {{- end }}
  {{- if and .Values.redis.enabled .Values.redis.auth.password }}
  redis-password: {{ .Values.redis.auth.password | quote }}
  {{- end }}
{{- end }}
{{- if and (ne (include "authelia.dbType" .) "sqlite") .Values.secrets.existingSecret (not .Values.database.external.existingSecret) }}
---
{{/* DB password separate secret — when credentials use existingSecret but DB does not */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "authelia.fullname" . }}-db
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
stringData:
  {{- if .Values.postgresql.enabled }}
  db-password: {{ .Values.postgresql.auth.password | quote }}
  {{- else if .Values.mysql.enabled }}
  db-password: {{ .Values.mysql.auth.password | quote }}
  {{- else }}
  db-password: {{ .Values.database.external.password | quote }}
  {{- end }}
{{- end }}
{{- if and .Values.backup.enabled (not .Values.backup.s3.existingSecret) }}
---
{{/* Backup S3 credentials secret */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "authelia.fullname" . }}-backup
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
stringData:
  access-key: {{ .Values.backup.s3.accessKey | quote }}
  secret-key: {{ .Values.backup.s3.secretKey | quote }}
{{- end }}
