apiVersion: v1
kind: Service
metadata:
  name: {{ include "authelia.fullname" . }}
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "authelia.selectorLabels" . | nindent 4 }}
---
{{- if and .Values.metrics.enabled .Values.config.telemetry.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "authelia.fullname" . }}-metrics
  labels:
    {{- include "authelia.labels" . | nindent 4 }}
  {{- with .Values.metrics.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: {{ .Values.metrics.service.port }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "authelia.selectorLabels" . | nindent 4 }}
{{- end }}
