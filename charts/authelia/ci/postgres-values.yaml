# CI: PostgreSQL storage + Redis session
database:
  type: postgres

postgresql:
  enabled: true
  auth:
    password: "ci-test-password"

redis:
  enabled: true
  auth:
    password: "ci-test-redis"

secrets:
  jwtSecret: "ci-jwt-secret-that-is-at-least-64-characters-long-for-testing-purposes-only"
  sessionSecret: "ci-session-secret-that-is-at-least-64-characters-long-for-testing-purposes-only"
  storageEncryptionKey: "ci-encryption-key-minimum-20-chars"
