suite: Users Secret
templates:
  - templates/users-secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render by default
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-authelia-users

  - it: should not render when usersDatabase is disabled
    set:
      usersDatabase.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when existingSecret is set
    set:
      usersDatabase.existingSecret: my-users-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should include user definitions
    set:
      usersDatabase.users:
        john:
          displayname: "John Doe"
          email: "john@example.com"
          password: "$argon2id$..."
          groups:
            - admins
    asserts:
      - matchRegex:
          path: stringData["users_database.yml"]
          pattern: "john:"
