suite: Deployment
templates:
  - templates/deployment.yaml
  - templates/secret.yaml
  - templates/users-secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment with defaults
    template: templates/deployment.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-authelia
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should use correct image
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "authelia/authelia:4.39.16"

  - it: should use custom image tag
    template: templates/deployment.yaml
    set:
      image.tag: "4.40.0"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "authelia/authelia:4.40.0"

  - it: should expose port 9091
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: http
            containerPort: 9091
            protocol: TCP

  - it: should mount config, secrets, users, and data volumes
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: config
            mountPath: /config/configuration.yml
            subPath: configuration.yml
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: secrets
            mountPath: /secrets
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: users
            mountPath: /config/users_database.yml
            subPath: users_database.yml
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data

  - it: should have startup, liveness, and readiness probes on /api/health
    template: templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.httpGet.path
          value: /api/health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /api/health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api/health

  - it: should inject JWT, session, and storage encryption env vars
    template: templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET_FILE
            value: /secrets/jwt-secret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTHELIA_SESSION_SECRET_FILE
            value: /secrets/session-secret
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE
            value: /secrets/storage-encryption-key

  - it: should not have init containers in sqlite mode
    template: templates/deployment.yaml
    asserts:
      - isNull:
          path: spec.template.spec.initContainers

  - it: should add wait-for-db init container in postgres mode
    template: templates/deployment.yaml
    set:
      database.type: postgres
      postgresql.enabled: true
      postgresql.auth.password: test123
    asserts:
      - isNotNull:
          path: spec.template.spec.initContainers
      - lengthEqual:
          path: spec.template.spec.initContainers
          count: 1
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db

  - it: should add wait-for-db init container with Redis check in postgres+redis mode
    template: templates/deployment.yaml
    set:
      database.type: postgres
      postgresql.enabled: true
      postgresql.auth.password: test123
      redis.enabled: true
      redis.auth.password: redis123
    asserts:
      - isNotNull:
          path: spec.template.spec.initContainers
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db

  - it: should add wait-for-redis init container in sqlite+redis mode
    template: templates/deployment.yaml
    set:
      redis.enabled: true
      redis.auth.password: redis123
    asserts:
      - isNotNull:
          path: spec.template.spec.initContainers
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-redis

  - it: should inject postgres password env var
    template: templates/deployment.yaml
    set:
      database.type: postgres
      postgresql.enabled: true
      postgresql.auth.password: test123
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTHELIA_STORAGE_POSTGRES_PASSWORD_FILE
            value: /secrets/db-password

  - it: should inject mysql password env var
    template: templates/deployment.yaml
    set:
      database.type: mysql
      mysql.enabled: true
      mysql.auth.password: test123
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTHELIA_STORAGE_MYSQL_PASSWORD_FILE
            value: /secrets/db-password

  - it: should inject redis password env var when redis is enabled
    template: templates/deployment.yaml
    set:
      redis.enabled: true
      redis.auth.password: redis123
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTHELIA_SESSION_REDIS_PASSWORD_FILE
            value: /secrets/redis-password

  - it: should expose metrics port when telemetry is enabled
    template: templates/deployment.yaml
    set:
      config.telemetry.metrics.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: metrics
            containerPort: 9959
            protocol: TCP

  - it: should use emptyDir when persistence is disabled
    template: templates/deployment.yaml
    set:
      persistence.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should not mount users volume when usersDatabase is disabled
    template: templates/deployment.yaml
    set:
      usersDatabase.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: users
            mountPath: /config/users_database.yml
            subPath: users_database.yml
            readOnly: true

  - it: should apply extra env vars
    template: templates/deployment.yaml
    set:
      extraEnv:
        - name: MY_VAR
          value: "test"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MY_VAR
            value: "test"
