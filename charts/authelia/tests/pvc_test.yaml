suite: PVC
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-authelia-data
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: should not render when disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when existingClaim is set
    set:
      persistence.existingClaim: my-claim
    asserts:
      - hasDocuments:
          count: 0
