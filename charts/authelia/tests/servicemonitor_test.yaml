suite: ServiceMonitor
templates:
  - templates/servicemonitor.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when fully enabled
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      config.telemetry.metrics.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: test-authelia

  - it: should not render when only serviceMonitor is enabled
    set:
      metrics.serviceMonitor.enabled: true
    asserts:
      - hasDocuments:
          count: 0
