# CI scenario: Paper server with GeyserMC cross-play
server:
  eula: true
  type: PAPER
  version: LATEST
  motd: "Geyser CI Server"
  maxPlayers: 20

jvm:
  memory: 2G
  useAikarFlags: true

geyser:
  enabled: true
  port: 19132

mods:
  modrinthProjects: "geyser,floodgate"

rcon:
  enabled: true
  password: ci-test-password

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi
