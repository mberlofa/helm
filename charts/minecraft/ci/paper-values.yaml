# CI scenario: Paper server with Aikar flags, whitelist, and metrics
server:
  eula: true
  type: PAPER
  version: LATEST
  motd: "Paper CI Server"
  difficulty: hard
  maxPlayers: 50
  viewDistance: 8

jvm:
  memory: 2G
  useAikarFlags: true

auth:
  onlineMode: true
  whitelist: "player1,player2"
  enforceWhitelist: true
  ops: "player1"

rcon:
  enabled: true
  password: ci-test-password

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 15s

persistence:
  enabled: true
  size: 5Gi

resources:
  requests:
    cpu: 500m
    memory: 2Gi
  limits:
    cpu: "2"
    memory: 4Gi
