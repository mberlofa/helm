# CI scenario: Forge modded server
server:
  eula: true
  type: FORGE
  version: "1.20.4"
  motd: "Forge CI Server"
  allowFlight: true

jvm:
  memory: 4G
  useAikarFlags: true

rcon:
  enabled: true
  password: ci-test-password

persistence:
  enabled: true
  size: 10Gi

resources:
  requests:
    cpu: 500m
    memory: 4Gi
  limits:
    cpu: "4"
    memory: 8Gi
