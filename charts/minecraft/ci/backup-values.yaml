# CI scenario: server with S3 backup enabled
server:
  eula: true
  type: VANILLA
  version: LATEST

jvm:
  memory: 1G

rcon:
  enabled: true
  password: ci-test-password

persistence:
  enabled: true
  size: 5Gi

backup:
  enabled: true
  schedule: "0 4 * * *"
  archivePrefix: minecraft-ci
  s3:
    endpoint: https://minio.example.com
    bucket: minecraft-backups
    prefix: ci
    existingSecret: minecraft-backup-s3

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: "1"
    memory: 2Gi
