suite: Backup
templates:
  - templates/backup-cronjob.yaml
  - templates/backup-configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render CronJob by default
    template: templates/backup-cronjob.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render ConfigMap by default
    template: templates/backup-configmap.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render CronJob when backup enabled
    template: templates/backup-cronjob.yaml
    set:
      rcon.enabled: true
      persistence.enabled: true
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: test-bucket
      backup.s3.existingSecret: backup-s3
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: metadata.name
          value: test-minecraft-backup

  - it: should set schedule from values
    template: templates/backup-cronjob.yaml
    set:
      rcon.enabled: true
      persistence.enabled: true
      backup.enabled: true
      backup.schedule: "0 2 * * *"
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: test-bucket
      backup.s3.existingSecret: backup-s3
    asserts:
      - equal:
          path: spec.schedule
          value: "0 2 * * *"

  - it: should have pre-backup and archive init containers
    template: templates/backup-cronjob.yaml
    set:
      rcon.enabled: true
      persistence.enabled: true
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: test-bucket
      backup.s3.existingSecret: backup-s3
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].name
          value: pre-backup
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[1].name
          value: archive

  - it: should have upload and post-backup containers
    template: templates/backup-cronjob.yaml
    set:
      rcon.enabled: true
      persistence.enabled: true
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: test-bucket
      backup.s3.existingSecret: backup-s3
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].name
          value: upload
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[1].name
          value: post-backup

  - it: should use existing secret for S3 credentials
    template: templates/backup-cronjob.yaml
    set:
      rcon.enabled: true
      persistence.enabled: true
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: test-bucket
      backup.s3.existingSecret: my-s3-secret
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].env[3].valueFrom.secretKeyRef.name
          value: my-s3-secret

  - it: should render backup scripts ConfigMap when backup enabled
    template: templates/backup-configmap.yaml
    set:
      rcon.enabled: true
      persistence.enabled: true
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: test-bucket
      backup.s3.existingSecret: backup-s3
    asserts:
      - isKind:
          of: ConfigMap
      - isNotNull:
          path: data["pre-backup.sh"]
      - isNotNull:
          path: data["archive-backup.sh"]
      - isNotNull:
          path: data["post-backup.sh"]
      - isNotNull:
          path: data["upload-backup.sh"]
