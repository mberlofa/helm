suite: PersistentVolumeClaim
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render PVC when persistence enabled
    set:
      persistence.enabled: true
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-minecraft

  - it: should not render PVC when persistence disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render PVC when existingClaim is set
    set:
      persistence.enabled: true
      persistence.existingClaim: my-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should set storage size
    set:
      persistence.enabled: true
      persistence.size: 50Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 50Gi

  - it: should set storage class
    set:
      persistence.enabled: true
      persistence.storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd

  - it: should set access mode
    set:
      persistence.enabled: true
      persistence.accessMode: ReadWriteMany
    asserts:
      - contains:
          path: spec.accessModes
          content: ReadWriteMany

  - it: should apply annotations
    set:
      persistence.enabled: true
      persistence.annotations:
        my-annotation: test
    asserts:
      - equal:
          path: metadata.annotations.my-annotation
          value: test
