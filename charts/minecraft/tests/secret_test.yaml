suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render RCON secret when rcon enabled
    set:
      rcon.enabled: true
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-minecraft

  - it: should not render RCON secret when existingSecret is set
    set:
      rcon.enabled: true
      rcon.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render RCON secret when rcon disabled
    set:
      rcon.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should encode provided password in base64
    set:
      rcon.enabled: true
      rcon.password: my-password
    asserts:
      - equal:
          path: data.rcon-password
          value: bXktcGFzc3dvcmQ=

  - it: should generate random password when not provided
    set:
      rcon.enabled: true
      rcon.password: ""
    asserts:
      - isNotNull:
          path: data.rcon-password

  - it: should render backup secret when backup enabled with inline credentials
    set:
      rcon.enabled: true
      persistence.enabled: true
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: my-access-key
      backup.s3.secretKey: my-secret-key
    asserts:
      - hasDocuments:
          count: 2

  - it: should not render backup secret when existingSecret is set
    set:
      rcon.enabled: true
      persistence.enabled: true
      backup.enabled: true
      backup.s3.endpoint: https://minio.example.com
      backup.s3.bucket: test-bucket
      backup.s3.existingSecret: my-backup-secret
    asserts:
      - hasDocuments:
          count: 1
