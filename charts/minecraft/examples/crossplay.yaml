# Paper server with GeyserMC cross-play (Java + Bedrock clients)
# helm install minecraft oci://ghcr.io/helmforgedev/helm/minecraft -f crossplay.yaml

server:
  eula: true
  type: PAPER
  version: LATEST
  motd: "Cross-Play Minecraft Server"
  maxPlayers: 30
  viewDistance: 8

jvm:
  memory: 3G
  useAikarFlags: true

geyser:
  enabled: true
  port: 19132

mods:
  modrinthProjects: "geyser,floodgate"

auth:
  onlineMode: true
  whitelist: "java_player1,bedrock_player1"
  enforceWhitelist: true

rcon:
  enabled: true

persistence:
  enabled: true
  size: 20Gi

resources:
  requests:
    cpu: "1"
    memory: 3Gi
  limits:
    cpu: "2"
    memory: 6Gi
