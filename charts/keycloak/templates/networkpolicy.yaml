{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "keycloak.fullname" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- if .Values.networkPolicy.ingress.allowSameNamespace }}
        - podSelector: {}
        {{- end }}
        {{- with .Values.networkPolicy.ingress.extraFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.http.port }}
    - from:
        {{- if .Values.networkPolicy.management.allowSameNamespace }}
        - podSelector: {}
        {{- end }}
        {{- with .Values.networkPolicy.management.extraFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ .Values.http.managementPort }}
    {{- if and .Values.networkPolicy.clustering.enabled (gt (int .Values.replicaCount) 1) }}
    - from:
        - podSelector:
            matchLabels:
              {{- include "keycloak.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: 7800
        - protocol: TCP
          port: 57800
    {{- end }}
{{- end }}
