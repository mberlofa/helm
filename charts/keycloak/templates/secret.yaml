{{- if not .Values.admin.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.adminSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.admin.existingSecretUsernameKey }}: {{ .Values.admin.username | b64enc | quote }}
  {{ .Values.admin.existingSecretPasswordKey }}: {{ include "keycloak.adminPassword" . | b64enc | quote }}
{{- end }}
{{- if and (include "keycloak.isProduction" .) (not .Values.database.existingSecret) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "keycloak.databaseSecretName" . }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
type: Opaque
data:
  {{ .Values.database.existingSecretPasswordKey }}: {{ include "keycloak.databasePassword" . | b64enc | quote }}
{{- end }}
