mode: production

hostname:
  hostname: https://sso.example.com
  admin: https://admin-sso.example.com

database:
  external:
    vendor: postgres
    host: postgresql.example.svc
    name: keycloak
    username: keycloak
    existingSecret: keycloak-db

ingress:
  public:
    enabled: true
    ingressClassName: traefik
    hosts:
      - host: sso.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - sso.example.com
        secretName: keycloak-tls
  admin:
    enabled: true
    ingressClassName: internal-nginx
    hosts:
      - host: admin-sso.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - admin-sso.example.com
        secretName: keycloak-admin-tls
