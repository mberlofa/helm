mode: production

hostname:
  hostname: https://sso.example.com

database:
  external:
    vendor: postgres
    host: postgresql.example.svc
    name: keycloak
    username: keycloak
    existingSecret: keycloak-db

extensions:
  providers:
    existingSecret: keycloak-providers
    rolloutToken: providers-v1
  themes:
    existingConfigMap: keycloak-themes
    rolloutToken: themes-v1

extraEnvFrom:
  - configMapRef:
      name: keycloak-runtime-env

initContainers:
  - name: prepare-themes
    image: busybox:1.36
    command:
      - sh
      - -c
      - echo preparing themes

extraContainers:
  - name: support-sidecar
    image: busybox:1.36
    command:
      - sh
      - -c
      - tail -f /dev/null
