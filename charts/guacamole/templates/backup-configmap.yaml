{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "guacamole.fullname" . }}-backup-scripts
  labels:
    {{- include "guacamole.labels" . | nindent 4 }}
data:
  {{- if eq (include "guacamole.dbType" .) "postgresql" }}
  postgres-backup.sh: |
    #!/bin/sh
    set -e
    TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    DUMP_FILE="/backup/{{ .Values.backup.archivePrefix }}-${TIMESTAMP}.sql.gz"
    echo "Dumping PostgreSQL database..."
    pg_dump --clean --if-exists | gzip > "${DUMP_FILE}"
    echo "Dump created: ${DUMP_FILE}"
  {{- else }}
  mysql-backup.sh: |
    #!/bin/sh
    set -e
    TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    DUMP_FILE="/backup/{{ .Values.backup.archivePrefix }}-${TIMESTAMP}.sql.gz"
    echo "Dumping MySQL database..."
    mysqldump --single-transaction --quick --skip-lock-tables --no-tablespaces -h "${MYSQL_HOST}" -u "${MYSQL_USER}" "${MYSQL_DATABASE}" | gzip > "${DUMP_FILE}"
    echo "Dump created: ${DUMP_FILE}"
  {{- end }}
  upload-backup.sh: |
    #!/bin/sh
    set -e
    ARCHIVE=$(ls -t /backup/*.sql.gz 2>/dev/null | head -1)
    if [ -z "${ARCHIVE}" ]; then
      echo "No backup archive found"; exit 1
    fi
    mc alias set s3 "${S3_ENDPOINT}" "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}"
    {{- if .Values.backup.s3.createBucketIfNotExists }}
    mc mb --ignore-existing "s3/${S3_BUCKET}"
    {{- end }}
    mc cp "${ARCHIVE}" "s3/${S3_BUCKET}/${S3_PREFIX}/$(basename "${ARCHIVE}")"
    echo "Upload complete: $(basename "${ARCHIVE}")"
{{- end }}
