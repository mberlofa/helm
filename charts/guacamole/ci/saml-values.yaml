# CI: SAML with Keycloak
postgresql:
  auth:
    password: ci-test-password

saml:
  enabled: true
  idpMetadataUrl: https://keycloak.example.com/realms/master/protocol/saml/descriptor
  entityId: https://guacamole.example.com
  callbackUrl: https://guacamole.example.com/

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: guacamole.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - guacamole.example.com
      secretName: guacamole-tls
