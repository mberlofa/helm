suite: Deployment
templates:
  - templates/deployment.yaml
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a Deployment
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: test-guacamole

  - it: should use default images
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "guacamole/guacamole:1.6.0"
      - equal:
          path: spec.template.spec.containers[1].image
          value: "guacamole/guacd:1.6.0"

  - it: should have guacamole and guacd containers
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
    asserts:
      - equal:
          path: spec.template.spec.containers[0].name
          value: guacamole
      - equal:
          path: spec.template.spec.containers[1].name
          value: guacd

  - it: should set GUACD_HOSTNAME to localhost
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: GUACD_HOSTNAME
            value: "localhost"

  - it: should set PostgreSQL env vars by default
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRESQL_HOSTNAME
            value: "test-postgresql"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRESQL_DATABASE
            value: "guacamole_db"

  - it: should set MySQL env vars when mysql type
    template: templates/deployment.yaml
    set:
      database.type: mysql
      mysql.enabled: true
      mysql.auth.password: test
      postgresql.enabled: false
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MYSQL_HOSTNAME
            value: "test-mysql"

  - it: should have wait-for-db init container
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].name
          value: wait-for-db

  - it: should set OIDC env vars when enabled
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
      oidc.enabled: true
      oidc.authorizationEndpoint: https://keycloak.example.com/realms/master/protocol/openid-connect/auth
      oidc.jwksEndpoint: https://keycloak.example.com/realms/master/protocol/openid-connect/certs
      oidc.issuer: https://keycloak.example.com/realms/master
      oidc.clientId: guacamole
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENID_AUTHORIZATION_ENDPOINT
            value: "https://keycloak.example.com/realms/master/protocol/openid-connect/auth"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENID_CLIENT_ID
            value: "guacamole"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENID_USERNAME_CLAIM_TYPE
            value: "preferred_username"

  - it: should not set OIDC env vars when disabled
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
      oidc.enabled: false
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENID_AUTHORIZATION_ENDPOINT
          any: true

  - it: should set SAML env vars when enabled
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
      saml.enabled: true
      saml.idpMetadataUrl: https://keycloak.example.com/realms/master/protocol/saml/descriptor
      saml.entityId: https://guacamole.example.com
      saml.callbackUrl: https://guacamole.example.com/
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SAML_IDP_METADATA_URL
            value: "https://keycloak.example.com/realms/master/protocol/saml/descriptor"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SAML_ENTITY_ID
            value: "https://guacamole.example.com"

  - it: should set TOTP env var when enabled
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
      totp.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TOTP_ENABLED
            value: "true"

  - it: should auto-detect OIDC redirect URI from ingress
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
      oidc.enabled: true
      oidc.authorizationEndpoint: https://kc.example.com/auth
      oidc.jwksEndpoint: https://kc.example.com/certs
      oidc.issuer: https://kc.example.com
      oidc.clientId: guacamole
      ingress.enabled: true
      ingress.hosts:
        - host: guacamole.example.com
          paths:
            - path: /
              pathType: Prefix
      ingress.tls:
        - hosts:
            - guacamole.example.com
          secretName: guacamole-tls
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: OPENID_REDIRECT_URI
            value: "https://guacamole.example.com/"

  - it: should set WEBAPP_CONTEXT to ROOT
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: WEBAPP_CONTEXT
            value: "ROOT"

  - it: should enable RemoteIpValve by default
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REMOTE_IP_VALVE_ENABLED
            value: "true"

  - it: should set guacd log level
    template: templates/deployment.yaml
    set:
      postgresql.auth.password: test
      guacd.logLevel: debug
    asserts:
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: GUACD_LOG_LEVEL
            value: "debug"
