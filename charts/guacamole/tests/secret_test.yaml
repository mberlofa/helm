suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render database secret when postgresql password set
    set:
      postgresql.auth.password: mypassword
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-guacamole-database
      - equal:
          path: data.password
          value: bXlwYXNzd29yZA==

  - it: should not render database secret when existingSecret set
    set:
      database.external.existingSecret: my-db-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should render backup S3 secret when backup enabled
    set:
      postgresql.auth.password: test
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-guacamole-backup-s3
