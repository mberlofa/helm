suite: HorizontalPodAutoscaler
templates:
  - hpa.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create HPA by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create HPA when enabled
    set:
      hpa.enabled: true
      hpa.minReplicas: 1
      hpa.maxReplicas: 5
      hpa.metrics:
        - resource: cpu
          type: Utilization
          target: 75
    asserts:
      - isKind:
          of: HorizontalPodAutoscaler
