suite: Deployment
templates:
  - deployment.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a Deployment by default
    asserts:
      - isKind:
          of: Deployment

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: test

  - it: should have 1 replica by default
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should have correct selector labels
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: test
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: test

  - it: should have rolling update strategy
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  - it: should not render when workload is disabled
    set:
      workload.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when workload type is StatefulSet
    set:
      workload.type: StatefulSet
    asserts:
      - hasDocuments:
          count: 0

  - it: should use named image tag format by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "container.registry.io/project/image:app-latest"
