suite: ServiceAccount
templates:
  - serviceaccount.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create ServiceAccount by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create ServiceAccount when enabled
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
