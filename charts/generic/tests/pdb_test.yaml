suite: PodDisruptionBudget
templates:
  - pdb.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not create PDB by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should create PDB when enabled
    set:
      pdb.enabled: true
      pdb.minAvailable: 1
    asserts:
      - isKind:
          of: PodDisruptionBudget
