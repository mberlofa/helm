# Values for checkov security scan validation.
# Proves the chart can produce secure manifests when properly configured.

replicaCount: 1

workload:
  enabled: true
  type: Deployment

image:
  repository: registry.example.com/app
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imageTagFormat: simple

containers:
  - name: app
    ports:
      - containerPort: 8080
    securityContext:
      readOnlyRootFilesystem: true
      runAsNonRoot: true
      runAsUser: 10000
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

podSecurityContext:
  runAsNonRoot: true
  fsGroup: 10000
  seccompProfile:
    type: RuntimeDefault

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 5

serviceAccount:
  create: true
  automountServiceAccountToken: false

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
