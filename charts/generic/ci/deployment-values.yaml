workload:
  enabled: true
  type: Deployment

imageTagFormat: simple
image:
  repository: nginx
  tag: "1.27"
  pullPolicy: IfNotPresent

containers:
  - name: app
    ports:
      - containerPort: 8080

service:
  port: 8080
  targetPort: 8080

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: app.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - app.example.com
      secretName: app-tls

livenessProbe:
  httpGet:
    path: /health
    port: 8080

readinessProbe:
  httpGet:
    path: /ready
    port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - resource: cpu
      type: Utilization
      target: 75

pdb:
  enabled: true
  minAvailable: 1
