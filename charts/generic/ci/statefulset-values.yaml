workload:
  enabled: true
  type: StatefulSet
  podManagementPolicy: Parallel
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

imageTagFormat: simple
image:
  repository: redis
  tag: "7.4"

containers:
  - name: redis
    ports:
      - containerPort: 6379

service:
  port: 6379
  targetPort: 6379
