# Example: Background worker (queue consumer, event processor)
# Deployment without Service or Ingress. No external traffic.
#
# helm install my-worker oci://ghcr.io/mberlofa/helm/generic --version 1.0.0 -f worker.yaml

workload:
  enabled: true
  type: Deployment

imageTagFormat: simple
image:
  repository: myregistry.io/my-worker
  tag: "1.0.0"

containers:
  - name: worker
    command: ["node", "worker.js"]

env:
  - name: QUEUE_URL
    valueFrom:
      secretKeyRef:
        name: worker-secrets
        key: queue-url
  - name: CONCURRENCY
    value: "5"

# No service or ingress needed for workers
ingress:
  enabled: false

livenessProbe:
  exec:
    command: ["node", "-e", "require('./healthcheck')"]
  initialDelaySeconds: 15
  periodSeconds: 30

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 20
  metrics:
    - resource: cpu
      type: Utilization
      target: 60
