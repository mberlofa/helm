{{- if and .Values.tunnel.token (not .Values.tunnel.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloudflared.tunnelSecretName" . }}
  labels:
    {{- include "cloudflared.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ include "cloudflared.tunnelSecretKey" . }}: {{ .Values.tunnel.token | quote }}
{{- end }}
