# Simple deployment with a single tunnel token.
#
# Prerequisites:
#   1. Create a tunnel in the Cloudflare dashboard:
#      https://one.dash.cloudflare.com → Networks → Tunnels → Create
#   2. Copy the tunnel token and paste below.
#   3. Configure public hostnames in the dashboard to route traffic
#      to your Kubernetes services (e.g., http://my-service.default.svc:80).

tunnel:
  token: "eyJhIjoiY2Y..."  # Replace with your tunnel token
