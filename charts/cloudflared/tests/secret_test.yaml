suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default (no token)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when token is provided
    set:
      tunnel.token: "my-tunnel-token"
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-cloudflared-tunnel
      - equal:
          path: stringData.token
          value: "my-tunnel-token"

  - it: should not render when existingSecret is used
    set:
      tunnel.token: "my-token"
      tunnel.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0
