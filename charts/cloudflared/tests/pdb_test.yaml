suite: PodDisruptionBudget
templates:
  - templates/pdb.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render by default
    asserts:
      - isKind:
          of: PodDisruptionBudget
      - equal:
          path: spec.minAvailable
          value: 1

  - it: should not render when disabled
    set:
      pdb.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set custom minAvailable
    set:
      pdb.minAvailable: 2
    asserts:
      - equal:
          path: spec.minAvailable
          value: 2
