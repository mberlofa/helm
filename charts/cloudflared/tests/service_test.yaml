suite: Service
templates:
  - templates/service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render metrics service by default
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].name
          value: metrics
      - equal:
          path: spec.ports[0].port
          value: 2000
      - equal:
          path: spec.ports[0].protocol
          value: TCP

  - it: should not render when metrics disabled
    set:
      metrics.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should set annotations
    set:
      service.annotations:
        prometheus.io/scrape: "true"
    asserts:
      - equal:
          path: metadata.annotations["prometheus.io/scrape"]
          value: "true"
