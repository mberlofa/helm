suite: PVC
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render both PVCs by default
    asserts:
      - hasDocuments:
          count: 2

  - it: should render conf PVC with correct size
    documentIndex: 0
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-adguard-home-conf
      - equal:
          path: spec.resources.requests.storage
          value: 256Mi

  - it: should render work PVC with correct size
    documentIndex: 1
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-adguard-home-work
      - equal:
          path: spec.resources.requests.storage
          value: 2Gi

  - it: should not render conf PVC when disabled
    set:
      persistence.conf.enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should not render work PVC when disabled
    set:
      persistence.work.enabled: false
    asserts:
      - hasDocuments:
          count: 1

  - it: should not render conf PVC when existingClaim is set
    set:
      persistence.conf.existingClaim: my-conf
    asserts:
      - hasDocuments:
          count: 1
