suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render when no config and no backup
    asserts:
      - hasDocuments:
          count: 0

  - it: should render config secret when adGuardHome config is set
    set:
      config.adGuardHome:
        http:
          address: "0.0.0.0:80"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-adguard-home-config

  - it: should not render config secret when existingSecret is set
    set:
      config.existingSecret: my-config
    asserts:
      - hasDocuments:
          count: 0

  - it: should render backup secret when backup is enabled
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.example.com
      backup.s3.bucket: my-bucket
      backup.s3.accessKey: AKID
      backup.s3.secretKey: SKEY
    asserts:
      - hasDocuments:
          count: 1
      - documentIndex: 0
        equal:
          path: metadata.name
          value: test-adguard-home-backup
