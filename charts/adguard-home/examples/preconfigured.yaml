# Pre-configured deployment — skips the setup wizard entirely.
# DNS is configured with Cloudflare + Google DoH upstream and AdGuard filter list.

config:
  adGuardHome:
    http:
      pprof:
        port: 6060
        enabled: false
      address: 0.0.0.0:80
      session_ttl: 720h
    users:
      - name: admin
        # bcrypt hash of "changeme" — generate yours with:
        # htpasswd -bnBC 10 "" 'YOUR_PASSWORD' | cut -d: -f2
        password: "$2y$10$hW1sBKsFxvB8gKIYQl1w4O/4LHDoqq1mA92Dg6rNULYAx4YPamq0K"
    dns:
      bind_hosts:
        - 0.0.0.0
      port: 53
      upstream_dns:
        - https://dns.cloudflare.com/dns-query
        - https://dns.google/dns-query
      bootstrap_dns:
        - 1.1.1.1
        - 8.8.8.8
      protection_enabled: true
      filtering_enabled: true
      cache_size: 4194304
    filtering:
      protection_enabled: true
      filtering_enabled: true
    filters:
      - enabled: true
        url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_1.txt
        name: AdGuard DNS filter
        id: 1
      - enabled: true
        url: https://adguardteam.github.io/HostlistsRegistry/assets/filter_2.txt
        name: AdAway Default Blocklist
        id: 2
    querylog:
      enabled: true
      interval: 24h
    statistics:
      enabled: true
      interval: 24h
    schema_version: 29

service:
  dns:
    type: LoadBalancer
    loadBalancerIP: "192.168.1.53"

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: adguard.home
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - adguard.home
      secretName: adguard-home-tls
