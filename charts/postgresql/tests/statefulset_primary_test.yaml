suite: StatefulSet Primary
templates:
  - statefulset-primary.yaml
  - configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a StatefulSet
    template: statefulset-primary.yaml
    asserts:
      - isKind:
          of: StatefulSet

  - it: should have correct name in standalone mode
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: metadata.name
          value: test-postgresql

  - it: should have correct name in replication mode
    template: statefulset-primary.yaml
    set:
      architecture: replication
    asserts:
      - equal:
          path: metadata.name
          value: test-postgresql-primary

  - it: should use the correct image
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "postgres:18.3-trixie"

  - it: should have selector labels matching template labels
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/name"]
          value: postgresql
      - equal:
          path: spec.selector.matchLabels["app.kubernetes.io/instance"]
          value: test

  - it: should have component label
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/component"]
          value: postgresql

  - it: should have standalone role in standalone mode
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/role"]
          value: standalone

  - it: should have primary role in replication mode
    template: statefulset-primary.yaml
    set:
      architecture: replication
    asserts:
      - equal:
          path: spec.template.metadata.labels["app.kubernetes.io/role"]
          value: primary

  - it: should always have 1 replica
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 1

  - it: should mount data volume
    template: statefulset-primary.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /var/lib/postgresql/data

  - it: should set PGDATA env var
    template: statefulset-primary.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PGDATA
            value: /var/lib/postgresql/data/pgdata

  - it: should use default port 5432
    template: statefulset-primary.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: postgres
            containerPort: 5432

  - it: should set security context
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsUser
          value: 999
      - equal:
          path: spec.template.spec.containers[0].securityContext.runAsNonRoot
          value: true

  - it: should set pod security context
    template: statefulset-primary.yaml
    asserts:
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 999

  - it: should have liveness probe by default
    template: statefulset-primary.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].livenessProbe

  - it: should have readiness probe by default
    template: statefulset-primary.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].readinessProbe

  - it: should have startup probe by default
    template: statefulset-primary.yaml
    asserts:
      - isNotNull:
          path: spec.template.spec.containers[0].startupProbe

  - it: should create VolumeClaimTemplate when persistence is enabled
    template: statefulset-primary.yaml
    asserts:
      - isNotNull:
          path: spec.volumeClaimTemplates
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 8Gi

  - it: should use emptyDir when persistence is disabled
    template: statefulset-primary.yaml
    set:
      standalone.persistence.enabled: false
    asserts:
      - isNull:
          path: spec.volumeClaimTemplates
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            emptyDir: {}

  - it: should use custom PVC size
    template: statefulset-primary.yaml
    set:
      standalone.persistence.size: 50Gi
    asserts:
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: 50Gi

  - it: should reference existing secret when configured
    template: statefulset-primary.yaml
    set:
      auth.existingSecret: my-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: postgres-password

  - it: should not have metrics sidecar by default
    template: statefulset-primary.yaml
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 1

  - it: should add metrics sidecar when enabled
    template: statefulset-primary.yaml
    set:
      metrics.enabled: true
    asserts:
      - lengthEqual:
          path: spec.template.spec.containers
          count: 2
      - equal:
          path: spec.template.spec.containers[1].name
          value: postgres-exporter

  - it: should not mount TLS volume by default
    template: statefulset-primary.yaml
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls
            mountPath: /tls
            readOnly: true

  - it: should mount TLS volume when enabled
    template: statefulset-primary.yaml
    set:
      tls.enabled: true
      tls.existingSecret: pg-tls
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: tls
            mountPath: /tls
            readOnly: true

  - it: should apply resource preset small
    template: statefulset-primary.yaml
    set:
      standalone.resourcesPreset: small
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 250m
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 512Mi
