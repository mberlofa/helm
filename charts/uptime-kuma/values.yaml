# =============================================================================
# Uptime Kuma Helm Chart — Default Values
# =============================================================================
# Focus: self-hosted monitoring with SQLite or MariaDB, status pages, notifications

nameOverride: ""
fullnameOverride: ""
commonLabels: {}

# =============================================================================
# Image
# =============================================================================

image:
  # -- Uptime Kuma container image
  repository: louislam/uptime-kuma
  # -- Image tag (defaults to appVersion)
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# =============================================================================
# Uptime Kuma Configuration
# =============================================================================

uptimeKuma:
  # -- Application port
  port: 3001
  # -- Allow iframe embedding from different origins
  disableFrameSameOrigin: false
  # -- Extra environment variables for the container
  # -- @default -- `[]`
  extraEnv: []
    # - name: NODE_EXTRA_CA_CERTS
    #   value: /app/data/ca.pem

# =============================================================================
# Database
# =============================================================================

database:
  # -- Database type: sqlite or mariadb
  type: sqlite
  # -- External MariaDB configuration (used when mysql subchart is disabled and type is mariadb)
  external:
    host: ""
    port: "3306"
    name: uptime_kuma
    username: uptime_kuma
    password: ""
    # -- Existing secret containing the database password
    existingSecret: ""
    # -- Key in the existing secret containing the password
    existingSecretPasswordKey: password

# =============================================================================
# Persistence
# =============================================================================

persistence:
  # -- Enable persistence for /app/data (SQLite DB, config, certificates)
  enabled: true
  # -- Storage size
  size: 2Gi
  # -- Storage class
  storageClass: ""
  # -- Access modes
  accessModes:
    - ReadWriteOnce
  # -- Use an existing PVC
  existingClaim: ""

# =============================================================================
# Service Account
# =============================================================================

serviceAccount:
  # -- Create a ServiceAccount
  create: false
  # -- ServiceAccount name
  name: ""
  # -- Annotations for the ServiceAccount
  annotations: {}

# =============================================================================
# Service
# =============================================================================

service:
  # -- Service type
  type: ClusterIP
  # -- HTTP service port
  port: 80
  # -- Annotations for the Service
  annotations: {}

# =============================================================================
# Ingress
# =============================================================================

ingress:
  # -- Enable ingress for Uptime Kuma
  enabled: false
  # -- Ingress class name (for example: traefik, nginx)
  ingressClassName: traefik
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt
  # -- Ingress hosts
  hosts: []
    # - host: status.example.com
    #   paths:
    #     - path: /
    #       pathType: Prefix
  # -- Ingress TLS configuration
  tls: []
    # - hosts:
    #     - status.example.com
    #   secretName: uptime-kuma-tls

# =============================================================================
# Probes
# =============================================================================

probes:
  startup:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
  liveness:
    enabled: true
    path: /
    initialDelaySeconds: 0
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    enabled: true
    path: /
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# =============================================================================
# Resources and Security
# =============================================================================

resources: {}

podSecurityContext: {}

securityContext: {}

# =============================================================================
# Scheduling
# =============================================================================

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 30

podLabels: {}
podAnnotations: {}

# =============================================================================
# Backup
# =============================================================================

backup:
  # -- Enable built-in backup CronJob (SQLite tar or mysqldump + S3 upload)
  enabled: false
  # -- Backup schedule in Cron format
  schedule: "0 2 * * *"
  # -- Suspend backup execution
  suspend: false
  # -- CronJob concurrency policy
  concurrencyPolicy: Forbid
  # -- Successful job history retained
  successfulJobsHistoryLimit: 3
  # -- Failed job history retained
  failedJobsHistoryLimit: 3
  # -- Job backoff limit
  backoffLimit: 1
  # -- Prefix for backup archive names
  archivePrefix: uptime-kuma
  # -- Resources for backup containers
  resources: {}
  images:
    uploader:
      repository: minio/mc
      tag: "RELEASE.2025-08-13T08-35-41Z"
      pullPolicy: IfNotPresent
    mysql:
      repository: mysql
      tag: "8.4"
      pullPolicy: IfNotPresent
  s3:
    # -- S3-compatible endpoint URL
    endpoint: ""
    # -- Target bucket name
    bucket: ""
    # -- Optional prefix inside the bucket
    prefix: uptime-kuma
    # -- Create bucket if not exists
    createBucketIfNotExists: true
    # -- Existing secret containing access-key and secret-key
    existingSecret: ""
    existingSecretAccessKeyKey: access-key
    existingSecretSecretKeyKey: secret-key
    # -- Inline access key
    accessKey: ""
    # -- Inline secret key
    secretKey: ""

# =============================================================================
# Extra
# =============================================================================

extraVolumes: []
extraVolumeMounts: []

# -- Extra manifests to deploy alongside the chart
extraManifests: []

# =============================================================================
# Subcharts
# =============================================================================

mysql:
  # -- Enable the local MySQL chart (used as MariaDB-compatible backend)
  enabled: false
  architecture: standalone
  auth:
    database: uptime_kuma
    username: uptime_kuma
    # -- Required when using the MySQL subchart
    password: ""
