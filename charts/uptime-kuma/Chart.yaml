apiVersion: v2
name: uptime-kuma
description: Uptime Kuma self-hosted monitoring with HTTP/TCP/DNS/Ping checks, notifications, status pages, and optional MariaDB
type: application
version: 0.1.0
appVersion: "2.2.1"
maintainers:
  - name: helmforgedev
  - name: mberlofa
keywords:
  - uptime
  - monitoring
  - status-page
  - health-check
  - self-hosted
home: https://uptime.kuma.pet
sources:
  - https://github.com/helmforgedev/charts
  - https://github.com/louislam/uptime-kuma
icon: https://uptime.kuma.pet/img/icon.svg
dependencies:
  - name: mysql
    version: 1.4.1
    repository: oci://ghcr.io/helmforgedev/helm
    condition: mysql.enabled
