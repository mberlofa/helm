{{- if .Values.backup.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "uptime-kuma.fullname" . }}-backup-scripts
  labels:
    {{- include "uptime-kuma.labels" . | nindent 4 }}
data:
  {{- if eq (include "uptime-kuma.dbType" .) "sqlite" }}
  sqlite-backup.sh: |
    #!/bin/sh
    set -e
    TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    ARCHIVE="/backup/{{ .Values.backup.archivePrefix }}-${TIMESTAMP}.tar.gz"
    echo "Creating SQLite backup archive..."
    tar -czf "${ARCHIVE}" -C /app/data .
    echo "Archive created: ${ARCHIVE}"
  {{- else }}
  mysql-backup.sh: |
    #!/bin/sh
    set -e
    TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    DUMP="/backup/{{ .Values.backup.archivePrefix }}-${TIMESTAMP}.sql.gz"
    echo "Dumping MariaDB database..."
    mysqldump -h "${DB_HOST}" -P "${DB_PORT}" -u "${DB_USER}" -p"${DB_PASSWORD}" "${DB_NAME}" | gzip > "${DUMP}"
    echo "Dump created: ${DUMP}"
  {{- end }}
  upload-backup.sh: |
    #!/bin/sh
    set -e
    ARCHIVE=$(ls -t /backup/*.gz 2>/dev/null | head -1)
    if [ -z "${ARCHIVE}" ]; then
      echo "No backup archive found"; exit 1
    fi
    mc alias set s3 "${S3_ENDPOINT}" "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}"
    {{- if .Values.backup.s3.createBucketIfNotExists }}
    mc mb --ignore-existing "s3/${S3_BUCKET}"
    {{- end }}
    mc cp "${ARCHIVE}" "s3/${S3_BUCKET}/${S3_PREFIX}/$(basename "${ARCHIVE}")"
    echo "Upload complete: $(basename "${ARCHIVE}")"
{{- end }}
