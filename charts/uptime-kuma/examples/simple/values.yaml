# Simple deployment with SQLite (default).
#
# Uptime Kuma stores all data in /app/data using SQLite.
# No external database required.
#
# After deploying, access the setup wizard:
#   kubectl port-forward svc/<release>-uptime-kuma 3001:80
#   Open http://localhost:3001

# Default values are sufficient for a simple deployment.
# Persistence is enabled by default (2Gi PVC).
