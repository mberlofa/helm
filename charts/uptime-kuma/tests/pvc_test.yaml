suite: PersistentVolumeClaim
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-uptime-kuma-data
      - equal:
          path: spec.resources.requests.storage
          value: 2Gi

  - it: should not render when persistence disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when existingClaim is set
    set:
      persistence.existingClaim: my-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should set custom storage class and size
    set:
      persistence.storageClass: fast-ssd
      persistence.size: 10Gi
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi
