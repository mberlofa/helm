suite: Ingress
templates:
  - templates/ingress.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: status.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: spec.rules[0].host
          value: status.example.com

  - it: should set TLS
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: status.example.com
          paths:
            - path: /
              pathType: Prefix
      ingress.tls:
        - hosts:
            - status.example.com
          secretName: uptime-kuma-tls
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: uptime-kuma-tls

  - it: should set ingressClassName
    set:
      ingress.enabled: true
      ingress.ingressClassName: nginx
      ingress.hosts:
        - host: status.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.ingressClassName
          value: nginx
