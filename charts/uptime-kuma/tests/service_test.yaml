suite: Service
templates:
  - templates/service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render by default
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].name
          value: http
      - equal:
          path: spec.ports[0].port
          value: 80
      - equal:
          path: spec.ports[0].protocol
          value: TCP

  - it: should set custom port
    set:
      service.port: 3001
    asserts:
      - equal:
          path: spec.ports[0].port
          value: 3001

  - it: should set annotations
    set:
      service.annotations:
        custom: annotation
    asserts:
      - equal:
          path: metadata.annotations.custom
          value: annotation
