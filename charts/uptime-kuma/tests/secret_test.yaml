suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render database secret in SQLite mode
    asserts:
      - hasDocuments:
          count: 0

  - it: should render database secret for external mariadb
    set:
      database.type: mariadb
      database.external.host: db.example.com
      database.external.password: my-password
    asserts:
      - documentIndex: 0
        isKind:
          of: Secret
      - documentIndex: 0
        equal:
          path: stringData.password
          value: "my-password"

  - it: should not render database secret when existingSecret is used
    set:
      database.type: mariadb
      database.external.host: db.example.com
      database.external.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should render backup secret when backup enabled with inline keys
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.example.com
      backup.s3.bucket: backups
      backup.s3.accessKey: my-access
      backup.s3.secretKey: my-secret
    asserts:
      - documentIndex: 0
        isKind:
          of: Secret
      - documentIndex: 0
        equal:
          path: stringData.access-key
          value: "my-access"
