suite: Service
templates:
  - service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a Service
    asserts:
      - isKind:
          of: Service

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: test-rabbitmq

  - it: should be ClusterIP by default
    asserts:
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose AMQP and management ports
    asserts:
      - contains:
          path: spec.ports
          content:
            name: amqp
            port: 5672
            targetPort: amqp
      - contains:
          path: spec.ports
          content:
            name: management
            port: 15672
            targetPort: management
