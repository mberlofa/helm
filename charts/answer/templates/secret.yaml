{{- if not .Values.admin.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "answer.fullname" . }}-admin
  labels:
    {{- include "answer.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $adminSecretName := printf "%s-admin" (include "answer.fullname" .) }}
  {{- $existingAdminSecret := lookup "v1" "Secret" .Release.Namespace $adminSecretName }}
  {{- if and $existingAdminSecret (not .Values.admin.password) }}
  admin-password: {{ index $existingAdminSecret.data "admin-password" }}
  {{- else if .Values.admin.password }}
  admin-password: {{ .Values.admin.password | b64enc | quote }}
  {{- else }}
  admin-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- $mode := include "answer.databaseMode" . }}
{{- if and (ne $mode "sqlite") (not (and (eq $mode "external") .Values.database.external.existingSecret)) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "answer.fullname" . }}-database
  labels:
    {{- include "answer.labels" . | nindent 4 }}
type: Opaque
data:
  {{- $dbSecretName := printf "%s-database" (include "answer.fullname" .) }}
  {{- $existingDbSecret := lookup "v1" "Secret" .Release.Namespace $dbSecretName }}
  {{- $dbPassword := include "answer.databasePasswordValue" . }}
  {{- if and $existingDbSecret (not $dbPassword) }}
  database-password: {{ index $existingDbSecret.data "database-password" }}
  {{- else if $dbPassword }}
  database-password: {{ $dbPassword | b64enc | quote }}
  {{- else }}
  database-password: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
---
{{- if and .Values.backup.enabled (not .Values.backup.s3.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "answer.fullname" . }}-backup
  labels:
    {{- include "answer.labels" . | nindent 4 }}
type: Opaque
data:
  access-key: {{ .Values.backup.s3.accessKey | b64enc | quote }}
  secret-key: {{ .Values.backup.s3.secretKey | b64enc | quote }}
{{- end }}
