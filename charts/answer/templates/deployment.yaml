apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "answer.fullname" . }}
  labels:
    {{- include "answer.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "answer.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "answer.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/secrets: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "answer.serviceAccountName" . }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if ne (include "answer.databaseMode" .) "sqlite" }}
      initContainers:
        - name: wait-for-db
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for {{ include "answer.databaseHost" . }}:{{ include "answer.databasePort" . }} ..."
              until nc -z -w2 {{ include "answer.databaseHost" . }} {{ include "answer.databasePort" . }}; do
                sleep 2
              done
              echo "Database is reachable."
      {{- end }}
      containers:
        - name: answer
          image: {{ include "answer.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          env:
            {{- if .Values.answer.autoInstall }}
            - name: AUTO_INSTALL
              value: "true"
            - name: DB_TYPE
              value: {{ include "answer.dbType" . | quote }}
            {{- if ne (include "answer.databaseMode" .) "sqlite" }}
            - name: DB_HOST
              value: {{ include "answer.dbHostPort" . | quote }}
            - name: DB_NAME
              value: {{ include "answer.databaseName" . | quote }}
            - name: DB_USERNAME
              value: {{ include "answer.databaseUsername" . | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "answer.databaseSecretName" . }}
                  key: {{ include "answer.databaseSecretKey" . }}
            {{- else }}
            - name: DB_FILE
              value: {{ .Values.database.sqlite.file | quote }}
            {{- end }}
            - name: LANGUAGE
              value: {{ .Values.answer.language | quote }}
            - name: SITE_NAME
              value: {{ .Values.answer.siteName | quote }}
            {{- if .Values.answer.siteUrl }}
            - name: SITE_URL
              value: {{ .Values.answer.siteUrl | quote }}
            {{- else if and .Values.ingress.enabled .Values.ingress.hosts }}
            - name: SITE_URL
              value: {{ printf "https://%s" (index .Values.ingress.hosts 0).host | quote }}
            {{- end }}
            - name: CONTACT_EMAIL
              value: {{ .Values.answer.contactEmail | quote }}
            - name: ADMIN_NAME
              value: {{ .Values.admin.name | quote }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "answer.adminSecretName" . }}
                  key: {{ include "answer.adminSecretKey" . }}
            - name: ADMIN_EMAIL
              value: {{ .Values.admin.email | quote }}
            {{- end }}
            - name: LOG_LEVEL
              value: {{ .Values.answer.logLevel | quote }}
            {{- with .Values.answer.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.startupProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "answer.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
