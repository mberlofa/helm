suite: PVC
templates:
  - templates/pvc.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render a PVC by default
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: test-answer-data

  - it: should set default size
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 5Gi

  - it: should set custom size
    set:
      persistence.size: 20Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 20Gi

  - it: should set storage class
    set:
      persistence.storageClass: fast
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast

  - it: should not render when persistence disabled
    set:
      persistence.enabled: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when existingClaim set
    set:
      persistence.existingClaim: my-pvc
    asserts:
      - hasDocuments:
          count: 0

  - it: should set annotations
    set:
      persistence.annotations:
        helm.sh/resource-policy: keep
    asserts:
      - equal:
          path: metadata.annotations["helm.sh/resource-policy"]
          value: keep
