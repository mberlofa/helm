suite: Ingress
templates:
  - templates/ingress.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: qa.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: test-answer

  - it: should set ingress class
    set:
      ingress.enabled: true
      ingress.ingressClassName: traefik
      ingress.hosts:
        - host: qa.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.ingressClassName
          value: traefik

  - it: should set TLS
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: qa.example.com
          paths:
            - path: /
              pathType: Prefix
      ingress.tls:
        - secretName: answer-tls
          hosts:
            - qa.example.com
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: answer-tls

  - it: should set annotations
    set:
      ingress.enabled: true
      ingress.annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      ingress.hosts:
        - host: qa.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: letsencrypt-prod

  - it: should point to correct service
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: qa.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: test-answer
