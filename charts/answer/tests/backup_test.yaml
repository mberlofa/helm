suite: Backup
templates:
  - templates/backup-cronjob.yaml
  - templates/backup-configmap.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    template: templates/backup-cronjob.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render configmap by default
    template: templates/backup-configmap.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should render CronJob when backup enabled (sqlite)
    template: templates/backup-cronjob.yaml
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    asserts:
      - isKind:
          of: CronJob
      - equal:
          path: metadata.name
          value: test-answer-backup
      - equal:
          path: spec.schedule
          value: "0 3 * * *"

  - it: should use sqlite init container by default
    template: templates/backup-cronjob.yaml
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].name
          value: sqlite-backup
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].image
          value: "alpine:3.22"

  - it: should use postgres init container for postgresql
    template: templates/backup-cronjob.yaml
    set:
      postgresql.enabled: true
      postgresql.auth.password: test
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].name
          value: postgres-backup
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].image
          value: "postgres:18.3-alpine"

  - it: should use mysql init container for mysql
    template: templates/backup-cronjob.yaml
    set:
      mysql.enabled: true
      mysql.auth.password: test
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].name
          value: mysql-backup
      - equal:
          path: spec.jobTemplate.spec.template.spec.initContainers[0].image
          value: "mysql:8.4"

  - it: should use minio mc for upload container
    template: templates/backup-cronjob.yaml
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    asserts:
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].name
          value: upload
      - equal:
          path: spec.jobTemplate.spec.template.spec.containers[0].image
          value: "minio/mc:RELEASE.2025-04-08T15-18-23Z"

  - it: should render backup scripts configmap
    template: templates/backup-configmap.yaml
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    asserts:
      - isKind:
          of: ConfigMap
      - equal:
          path: metadata.name
          value: test-answer-backup-scripts
      - exists:
          path: data["sqlite-backup.sh"]
      - exists:
          path: data["postgres-backup.sh"]
      - exists:
          path: data["mysql-backup.sh"]
      - exists:
          path: data["upload-backup.sh"]

  - it: should mount data PVC for sqlite backup
    template: templates/backup-cronjob.yaml
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    asserts:
      - contains:
          path: spec.jobTemplate.spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: test-answer-data

  - it: should not mount data PVC for postgresql backup
    template: templates/backup-cronjob.yaml
    set:
      postgresql.enabled: true
      postgresql.auth.password: test
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    asserts:
      - notContains:
          path: spec.jobTemplate.spec.template.spec.volumes
          content:
            name: data
          any: true
