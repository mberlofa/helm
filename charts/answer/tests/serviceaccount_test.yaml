suite: ServiceAccount
templates:
  - templates/serviceaccount.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when created
    set:
      serviceAccount.create: true
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: test-answer

  - it: should use custom name
    set:
      serviceAccount.create: true
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should set annotations
    set:
      serviceAccount.create: true
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::role/answer
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: "arn:aws:iam::role/answer"
