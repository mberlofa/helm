suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render admin secret by default
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-answer-admin
      - exists:
          path: data["admin-password"]

  - it: should not render admin secret when existingSecret set
    set:
      admin.existingSecret: my-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: should set explicit admin password
    set:
      admin.password: mypassword
    documentIndex: 0
    asserts:
      - equal:
          path: data["admin-password"]
          value: bXlwYXNzd29yZA==

  - it: should not render database secret in sqlite mode
    asserts:
      - hasDocuments:
          count: 1

  - it: should render database secret for postgresql
    set:
      postgresql.enabled: true
      postgresql.auth.password: dbpass
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-answer-database
      - equal:
          path: data["database-password"]
          value: ZGJwYXNz

  - it: should not render database secret for external with existingSecret
    set:
      database.external.host: db.example.com
      database.external.existingSecret: my-db-secret
    asserts:
      - hasDocuments:
          count: 1

  - it: should render backup secret when backup enabled
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.amazonaws.com
      backup.s3.bucket: test-bucket
      backup.s3.accessKey: AKIA123
      backup.s3.secretKey: secret123
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-answer-backup
