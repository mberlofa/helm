# External database — connect to existing PostgreSQL or MySQL
database:
  external:
    vendor: postgres
    host: postgresql-rw.default.svc
    name: answer
    username: answer
    existingSecret: answer-db-credentials

persistence:
  enabled: true
  size: 5Gi

ingress:
  enabled: true
  ingressClassName: traefik
  hosts:
    - host: qa.example.com
      paths:
        - path: /
          pathType: Prefix
