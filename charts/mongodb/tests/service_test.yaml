suite: Service
templates:
  - service.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render headless and client services
    asserts:
      - hasDocuments:
          count: 2

  - it: should have headless service
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: test-mongodb-headless
      - equal:
          path: spec.clusterIP
          value: None

  - it: should have client service
    documentIndex: 1
    asserts:
      - equal:
          path: metadata.name
          value: test-mongodb
      - equal:
          path: spec.type
          value: ClusterIP

  - it: should expose port 27017
    documentIndex: 1
    asserts:
      - contains:
          path: spec.ports
          content:
            name: mongodb
            port: 27017
            targetPort: mongodb
