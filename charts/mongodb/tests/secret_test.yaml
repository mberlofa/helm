suite: Secret
templates:
  - secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should be a Secret
    asserts:
      - isKind:
          of: Secret

  - it: should have correct name
    asserts:
      - equal:
          path: metadata.name
          value: test-mongodb

  - it: should be Opaque type
    asserts:
      - equal:
          path: type
          value: Opaque

  - it: should contain root password key
    asserts:
      - isNotNull:
          path: data["mongodb-root-password"]

  - it: should not be created when existingSecret is set
    set:
      auth.existingSecret: my-external-secret
    asserts:
      - hasDocuments:
          count: 0
