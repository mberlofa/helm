# Minimal standalone MongoDB
# helm install mongodb oci://ghcr.io/helmforgedev/charts/mongodb -f standalone-simple.yaml

architecture: standalone

auth:
  enabled: true
  rootUser: admin
  rootPassword: "changeme"

persistence:
  size: 10Gi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi
