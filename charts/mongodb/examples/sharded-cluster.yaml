# Sharded cluster: 2 mongos, 3 config servers, 2 shards x 3 members
# helm install mongodb oci://ghcr.io/helmforgedev/charts/mongodb -f sharded-cluster.yaml

architecture: sharded

auth:
  enabled: true
  rootUser: admin
  rootPassword: "changeme-use-existingSecret"

sharded:
  mongos:
    replicaCount: 2
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi

  configServer:
    replicaCount: 3
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
    persistence:
      size: 8Gi

  shards:
    count: 2
    membersPerShard: 3
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: "2"
        memory: 4Gi
    persistence:
      size: 50Gi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
