suite: Secret
templates:
  - templates/secret.yaml
release:
  name: test
  namespace: default
tests:
  - it: should render admin secret by default
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-wordpress-admin

  - it: should not render admin secret when existingSecret is set
    set:
      admin.existingSecret: my-admin-secret
    documentIndex: 0
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-wordpress-database

  - it: should encode admin password in base64
    set:
      wordpress.adminPassword: my-password
    documentIndex: 0
    asserts:
      - equal:
          path: data.admin-password
          value: bXktcGFzc3dvcmQ=

  - it: should generate random admin password when not provided
    documentIndex: 0
    asserts:
      - isNotNull:
          path: data.admin-password

  - it: should render database secret
    documentIndex: 1
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-wordpress-database

  - it: should encode database password in base64
    set:
      mysql.auth.password: db-password
    documentIndex: 1
    asserts:
      - equal:
          path: data.database-password
          value: ZGItcGFzc3dvcmQ=

  - it: should generate random database password when not provided
    documentIndex: 1
    asserts:
      - isNotNull:
          path: data.database-password

  - it: should render backup secret when backup enabled
    set:
      backup.enabled: true
      backup.s3.endpoint: https://s3.example.com
      backup.s3.bucket: test
      backup.s3.accessKey: mykey
      backup.s3.secretKey: mysecret
    documentIndex: 2
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-wordpress-backup
