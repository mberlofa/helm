suite: ServiceMonitor
templates:
  - templates/servicemonitor.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should not render when only metrics is enabled
    set:
      metrics.enabled: true
    asserts:
      - hasDocuments:
          count: 0

  - it: should render when both metrics and serviceMonitor are enabled
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor
      - equal:
          path: metadata.name
          value: test-wordpress

  - it: should set scrape interval
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
      metrics.serviceMonitor.interval: 60s
    asserts:
      - equal:
          path: spec.endpoints[0].interval
          value: 60s

  - it: should target metrics port
    set:
      metrics.enabled: true
      metrics.serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: metrics
