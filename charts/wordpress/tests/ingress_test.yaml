suite: Ingress
templates:
  - templates/ingress.yaml
release:
  name: test
  namespace: default
tests:
  - it: should not render ingress by default
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ingress when enabled
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: blog.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - isKind:
          of: Ingress

  - it: should set ingressClassName
    set:
      ingress.enabled: true
      ingress.ingressClassName: traefik
      ingress.hosts:
        - host: blog.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.ingressClassName
          value: traefik

  - it: should configure hosts and paths
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: blog.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: spec.rules[0].host
          value: blog.example.com
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: test-wordpress

  - it: should configure TLS
    set:
      ingress.enabled: true
      ingress.hosts:
        - host: blog.example.com
          paths:
            - path: /
              pathType: Prefix
      ingress.tls:
        - secretName: wordpress-tls
          hosts:
            - blog.example.com
    asserts:
      - equal:
          path: spec.tls[0].secretName
          value: wordpress-tls

  - it: should set annotations
    set:
      ingress.enabled: true
      ingress.annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      ingress.hosts:
        - host: blog.example.com
          paths:
            - path: /
              pathType: Prefix
    asserts:
      - equal:
          path: metadata.annotations["cert-manager.io/cluster-issuer"]
          value: letsencrypt-prod
