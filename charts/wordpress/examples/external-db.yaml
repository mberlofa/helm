# WordPress with external MySQL/MariaDB database

mysql:
  enabled: false

database:
  external:
    host: db.example.com
    port: 3306
    name: wordpress
    username: wordpress
    existingSecret: wordpress-db-credentials
    existingSecretPasswordKey: password

wordpress:
  siteUrl: "https://blog.example.com"
  adminEmail: admin@example.com

ingress:
  enabled: true
  ingressClassName: nginx
  hosts:
    - host: blog.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wordpress-tls
      hosts:
        - blog.example.com

persistence:
  enabled: true
  size: 10Gi
