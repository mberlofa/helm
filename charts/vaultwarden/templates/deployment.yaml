apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vaultwarden.fullname" . }}
  labels:
    {{- include "vaultwarden.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vaultwarden.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vaultwarden.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/secrets: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: vaultwarden
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: DOMAIN
              value: {{ include "vaultwarden.domain" . | quote }}
            - name: SIGNUPS_ALLOWED
              value: {{ ternary "true" "false" .Values.vaultwarden.signupsAllowed | quote }}
            - name: SIGNUPS_VERIFY
              value: {{ ternary "true" "false" .Values.vaultwarden.signupsVerify | quote }}
            - name: SIGNUPS_VERIFY_RESEND_TIME
              value: {{ .Values.vaultwarden.signupsVerifyResendTime | quote }}
            - name: SIGNUPS_VERIFY_RESEND_LIMIT
              value: {{ .Values.vaultwarden.signupsVerifyResendLimit | quote }}
            {{- with .Values.vaultwarden.signupsDomainsWhitelist }}
            - name: SIGNUPS_DOMAINS_WHITELIST
              value: {{ join "," . | quote }}
            {{- end }}
            - name: INVITATIONS_ALLOWED
              value: {{ ternary "true" "false" .Values.vaultwarden.invitationsAllowed | quote }}
            - name: INVITATION_ORG_NAME
              value: {{ .Values.vaultwarden.invitationOrgName | quote }}
            - name: INVITATION_EXPIRATION_HOURS
              value: {{ .Values.vaultwarden.invitationExpirationHours | quote }}
            - name: SENDS_ALLOWED
              value: {{ ternary "true" "false" .Values.vaultwarden.sendsAllowed | quote }}
            - name: EMERGENCY_ACCESS_ALLOWED
              value: {{ ternary "true" "false" .Values.vaultwarden.emergencyAccessAllowed | quote }}
            - name: EMAIL_CHANGE_ALLOWED
              value: {{ ternary "true" "false" .Values.vaultwarden.emailChangeAllowed | quote }}
            - name: ORG_EVENTS_ENABLED
              value: {{ ternary "true" "false" .Values.vaultwarden.orgEventsEnabled | quote }}
            {{- if .Values.vaultwarden.orgCreationUsers }}
            - name: ORG_CREATION_USERS
              value: {{ .Values.vaultwarden.orgCreationUsers | quote }}
            {{- end }}
            - name: PASSWORD_ITERATIONS
              value: {{ .Values.vaultwarden.passwordIterations | quote }}
            - name: PASSWORD_HINTS_ALLOWED
              value: {{ ternary "true" "false" .Values.vaultwarden.passwordHintsAllowed | quote }}
            - name: SHOW_PASSWORD_HINT
              value: {{ ternary "true" "false" .Values.vaultwarden.showPasswordHint | quote }}
            - name: ENABLE_WEBSOCKET
              value: {{ ternary "true" "false" .Values.vaultwarden.websocket.enabled | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.vaultwarden.logLevel | quote }}
            - name: IP_HEADER
              value: {{ .Values.vaultwarden.proxy.ipHeader | quote }}
            {{- if eq (include "vaultwarden.databaseMode" .) "sqlite" }}
            - name: ENABLE_DB_WAL
              value: {{ ternary "true" "false" .Values.database.sqlite.enableWal | quote }}
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultwarden.databasePasswordSecretName" . }}
                  key: {{ include "vaultwarden.databasePasswordSecretKey" . }}
            {{- end }}
            - name: DB_CONNECTION_RETRIES
              value: {{ .Values.database.connection.retries | quote }}
            - name: DATABASE_TIMEOUT
              value: {{ .Values.database.connection.timeout | quote }}
            - name: DATABASE_IDLE_TIMEOUT
              value: {{ .Values.database.connection.idleTimeout | quote }}
            - name: DATABASE_MIN_CONNS
              value: {{ .Values.database.connection.minConnections | quote }}
            - name: DATABASE_MAX_CONNS
              value: {{ .Values.database.connection.maxConnections | quote }}
            {{- if .Values.database.connection.init }}
            - name: DATABASE_CONN_INIT
              value: {{ .Values.database.connection.init | quote }}
            {{- end }}
            {{- if include "vaultwarden.adminEnabled" . }}
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultwarden.adminSecretName" . }}
                  key: {{ .Values.admin.existingSecretTokenKey }}
            {{- end }}
            {{- if .Values.smtp.enabled }}
            - name: SMTP_HOST
              value: {{ required "smtp.host is required when smtp.enabled is true" .Values.smtp.host | quote }}
            - name: SMTP_PORT
              value: {{ .Values.smtp.port | quote }}
            - name: SMTP_FROM
              value: {{ required "smtp.from is required when smtp.enabled is true" .Values.smtp.from | quote }}
            - name: SMTP_FROM_NAME
              value: {{ .Values.smtp.fromName | quote }}
            - name: SMTP_TIMEOUT
              value: {{ .Values.smtp.timeout | quote }}
            - name: SMTP_SECURITY
              value: {{ .Values.smtp.security | quote }}
            {{- if .Values.smtp.authMechanism }}
            - name: SMTP_AUTH_MECHANISM
              value: {{ .Values.smtp.authMechanism | quote }}
            {{- end }}
            {{- if .Values.smtp.heloName }}
            - name: HELO_NAME
              value: {{ .Values.smtp.heloName | quote }}
            {{- end }}
            - name: SMTP_EMBED_IMAGES
              value: {{ ternary "true" "false" .Values.smtp.embedImages | quote }}
            - name: SMTP_DEBUG
              value: {{ ternary "true" "false" .Values.smtp.debug | quote }}
            - name: SMTP_ACCEPT_INVALID_CERTS
              value: {{ ternary "true" "false" .Values.smtp.acceptInvalidCerts | quote }}
            - name: SMTP_ACCEPT_INVALID_HOSTNAMES
              value: {{ ternary "true" "false" .Values.smtp.acceptInvalidHostnames | quote }}
            {{- if .Values.smtp.username }}
            - name: SMTP_USERNAME
              value: {{ .Values.smtp.username | quote }}
            {{- end }}
            {{- if include "vaultwarden.smtpPasswordEnabled" . }}
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vaultwarden.smtpSecretName" . }}
                  key: {{ .Values.smtp.existingSecretPasswordKey }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.data.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "vaultwarden.persistenceClaimName" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
