{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vaultwarden.fullname" . }}
  labels:
    {{- include "vaultwarden.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vaultwarden.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egress.enabled }}
    - Egress
    {{- end }}
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
      {{- $sameNamespace := .Values.networkPolicy.ingress.allowSameNamespace }}
      {{- $additionalFrom := .Values.networkPolicy.ingress.additionalFrom }}
      from:
        {{- if $sameNamespace }}
        - podSelector: {}
        {{- end }}
        {{- with $additionalFrom }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if not (or $sameNamespace $additionalFrom) }}
        []
        {{- end }}
  {{- if .Values.networkPolicy.egress.enabled }}
  egress:
    - {{- if .Values.networkPolicy.egress.allowDns }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
      {{- end }}
      {{- if .Values.networkPolicy.egress.additionalTo }}
      to:
        {{- toYaml .Values.networkPolicy.egress.additionalTo | nindent 8 }}
      {{- else if not .Values.networkPolicy.egress.allowDns }}
      to: []
      {{- end }}
  {{- end }}
{{- end }}
