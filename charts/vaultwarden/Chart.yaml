apiVersion: v2
name: vaultwarden
description: Vaultwarden for Kubernetes with persistent SQLite storage and explicit ingress/domain configuration
type: application
version: 1.5.0
appVersion: "1.35.4"
maintainers:
  - name: mberlofa
keywords:
  - vaultwarden
  - bitwarden
  - password-manager
  - self-hosted
home: https://github.com/dani-garcia/vaultwarden
sources:
  - https://github.com/mberlofa/helm
  - https://github.com/dani-garcia/vaultwarden
icon: https://github.com/dani-garcia/vaultwarden/raw/main/resources/vaultwarden-icon.png
dependencies:
  - name: postgresql
    version: 1.3.0
    repository: file://../postgresql
    condition: postgresql.enabled
  - name: mysql
    version: 1.3.0
    repository: file://../mysql
    condition: mysql.enabled
